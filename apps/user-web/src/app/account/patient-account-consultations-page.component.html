<section class="consult-page panel">
  <div class="page-hdr">
    <p class="eyebrow">My Account</p>
    <h1>My consultations</h1>
    <p class="page-lead">View past and active consultations. Pay pending ones or open the care dashboard to chat with your doctor.</p>
    <a class="dash-link" [routerLink]="dashboardLink">Open care dashboard</a>
  </div>

  @if (notice()) {
    <p class="notice">{{ notice() }}</p>
  }

  @if (loading()) {
    <p class="loading-text">Loading consultations…</p>
  } @else {
    <app-consultation-list
      [consultations]="consultations()"
      [activeId]="activeId()"
      userRole="PATIENT"
      [disabled]="processing()"
      [paymentIdle]="paymentService.paymentFlowState() === 'IDLE'"
      (selected)="selectConsultation($event)"
      (pay)="pay($event)"
    />
  }
</section>

<app-payment-status-overlay
  [state]="paymentService.paymentFlowState()"
  [title]="paymentFlowTitle()"
  [message]="paymentFlowMessage()"
  [canRetry]="!!paymentService.paymentFlowConsultation()"
  (retry)="retryPayment()"
  (close)="closePaymentOverlay()"
/>
