<div class="walk-in-page">
  <div class="hdr">
    <h2>Walk-in registration</h2>
    <p>Register a patient at the desk and add them to the queue</p>
  </div>

  <form class="form" (ngSubmit)="submit()">
    <label>Name
      <input [formField]="walkInForm.name" />
    </label>
    <label>Mobile
      <input [formField]="walkInForm.mobile" />
    </label>
    <label>Email (optional)
      <input [formField]="walkInForm.email" type="email" />
    </label>
    <label>Concern / disease
      <select [formField]="walkInForm.diseaseId">
        <option value="">Select…</option>
        @for (d of diseases(); track d.id) {
          <option [value]="d.id">{{ d.name }} — ₹{{ formatPaise(d.feeInPaise) }}</option>
        }
      </select>
    </label>
    <label>Notes (optional)
      <textarea [formField]="walkInForm.notes" rows="2"></textarea>
    </label>
    <label class="check">
      <input type="checkbox" [formField]="walkInForm.collectCash" />
      Cash collected at desk
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="btn-primary" [disabled]="loading() || walkInForm().invalid()">
      {{ loading() ? 'Saving…' : 'Register & add to queue' }}
    </button>
  </form>
</div>

@if (toast()) { <div class="toast">{{ toast() }}</div> }
