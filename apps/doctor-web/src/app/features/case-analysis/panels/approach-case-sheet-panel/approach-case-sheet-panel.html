<section class="panel case-sheet-panel">
  <div class="panel-title-row">
    <h3>{{ title }}</h3>
    <div class="panel-save-actions">
      <span class="autosave-note muted">Auto-saves as you type</span>
      <button type="button" class="btn-save-now" (click)="saveRequested.emit()" [disabled]="saving">
        {{ saving ? 'Saving…' : 'Save now' }}
      </button>
    </div>
  </div>
  <p class="hint">{{ description }}</p>
  <div class="case-sheet-grid">
    @for (field of fields; track field.key) {
      <label [class.wide]="field.wide">
        <span class="field-label-row">
          <span class="field-label">
            {{ field.label }}
            <app-approach-field-hint [field]="field" />
            @if (field.required) {
              <span class="required-badge">Required</span>
            }
          </span>
          <span class="field-actions">
            @if (field.rubricSearchable) {
              <button
                type="button"
                class="btn-field-action"
                (click)="searchRubricsFromField(field)"
                [disabled]="!caseSheetValues[field.key]?.trim()"
              >
                Search rubrics
              </button>
            }
            @if (field.suggestEndpoint) {
              <button type="button" class="btn-field-action btn-ai" (click)="suggestField(field)">
                @switch (field.suggestEndpoint) {
                  @case ('ai-extract-intake') { From intake }
                  @case ('ai-extract-media') { From photos }
                  @default { Suggest }
                }
              </button>
            }
          </span>
        </span>

        @if (field.fieldType === 'select') {
          <select [formField]="$any(caseSheetForm)[field.key]">
            <option value="">Select…</option>
            @for (option of field.options || []; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        } @else if (isMultiline(field)) {
          <textarea
            [rows]="field.rows || 2"
            [formField]="$any(caseSheetForm)[field.key]"
            [attr.placeholder]="field.placeholder || null"
          ></textarea>
        } @else {
          <input [formField]="$any(caseSheetForm)[field.key]" [attr.placeholder]="field.placeholder || null" />
        }
        @if (optionGroups(field).length) {
          <div class="field-option-groups">
            @for (group of optionGroups(field); track group.title) {
              <div class="field-option-group">
                <span>{{ group.title }}</span>
                <div>
                  @for (option of group.options; track option) {
                    <button
                      type="button"
                      class="field-option-chip"
                      [class.selected]="hasFieldOption(field, option)"
                      (click)="addFieldOption(field, option)"
                    >
                      {{ option }}
                      @if (hasFieldOption(field, option)) {
                        <span aria-hidden="true">x</span>
                      }
                    </button>
                  }
                </div>
              </div>
            }
          </div>
        }
      </label>
    }
  </div>
</section>
